<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect x="3" y="3" width="42" height="42" rx="10" fill="#1a2420" stroke="#d9a441" stroke-width="2"/>
  <!-- dungeon floor -->
  <rect x="7" y="7" width="34" height="34" rx="2" fill="#212c29"/>
  <!-- room 1 -->
  <rect x="8" y="8" width="17" height="15" fill="#2b3834" stroke="#d9a441" stroke-width="1.2" stroke-opacity="0.75"/>
  <!-- room 2 -->
  <rect x="28" y="8" width="13" height="22" fill="#2b3834" stroke="#d9a441" stroke-width="1.2" stroke-opacity="0.75"/>
  <!-- corridor h -->
  <rect x="25" y="12" width="4" height="6" fill="#2b3834"/>
  <!-- door marker -->
  <rect x="24.5" y="13" width="1.5" height="4" fill="#d9a441" rx="0.5"/>
  <!-- room 3 -->
  <rect x="8" y="26" width="17" height="13" fill="#2b3834" stroke="#d9a441" stroke-width="1.2" stroke-opacity="0.75"/>
  <!-- corridor v -->
  <rect x="10" y="23" width="6" height="4" fill="#2b3834"/>
  <!-- door marker v -->
  <rect x="12" y="22.5" width="4" height="1.5" fill="#d9a441" rx="0.5"/>
  <!-- stairs lines in room 2 -->
  <line x1="30" y1="11" x2="39" y2="11" stroke="#d9a441" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="30" y1="13.5" x2="39" y2="13.5" stroke="#d9a441" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="30" y1="16" x2="39" y2="16" stroke="#d9a441" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- token circle in room 1 -->
  <circle cx="15" cy="15" r="3.5" fill="none" stroke="#d9a441" stroke-width="1.3" stroke-opacity="0.9"/>
  <!-- token circle in room 3 -->
  <circle cx="17" cy="33" r="2.5" fill="none" stroke="#d9a441" stroke-width="1" stroke-opacity="0.6"/>
  <!-- subtle grid -->
  <line x1="7" y1="19" x2="41" y2="19" stroke="#d9a441" stroke-width="0.35" stroke-opacity="0.18"/>
  <line x1="7" y1="28" x2="41" y2="28" stroke="#d9a441" stroke-width="0.35" stroke-opacity="0.18"/>
  <line x1="19" y1="7" x2="19" y2="41" stroke="#d9a441" stroke-width="0.35" stroke-opacity="0.18"/>
  <line x1="28" y1="7" x2="28" y2="41" stroke="#d9a441" stroke-width="0.35" stroke-opacity="0.18"/>
</svg>
