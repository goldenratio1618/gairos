  <!-- left upper facet line -->
  <line x1="24" y1="7" x2="15" y2="24" stroke="#d9a441" stroke-width="1.1" stroke-opacity="0.6"/>
  <!-- right upper facet line -->
  <line x1="24" y1="7" x2="33" y2="24" stroke="#d9a441" stroke-width="1.1" stroke-opacity="0.6"/>
  <!-- lower left facet line -->
  <line x1="15" y1="24" x2="7" y2="38" stroke="#d9a441" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- lower right facet line -->
  <line x1="33" y1="24" x2="41" y2="38" stroke="#d9a441" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- 20 label in lower face -->
  <text x="24" y="35" text-anchor="middle" fill="#d9a441" font-size="9" font-family="'IBM Plex Sans',sans-serif" font-weight="700" letter-spacing="-0.5">20</text>
</svg>
